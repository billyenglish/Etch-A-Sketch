<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETCH-A-SKETCH</title>
    <link rel="stylesheet" href="/css/reset.css" type="text/css">
    <link rel="stylesheet" href="/css/styles.css" type="text/css">
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>ETCH-A-SKETCH</h1>
    </header>
    <main>
        <div id="container">
            <div id="control-panel">
                <div>
                    <input type="color" id="color-picker" value="#000000">
                </div>
                <button type="button" name="color-button" id="color-button">Color</button>
                <button type="button" name="color-button" id="random-color">Random Color</button>
                <button type="button" name="erase-cell" id="erase-cell">Erase Cell</button>
                <button type="button" name="clear-grid" id="clear-grid">Clear Grid</button>
                <div class="grid-input">
                    <input type="range" id="grid-size" name="grid-size" min="1" max="100" value="16">
                    <div id="grid-display">
                        <p>Grid Size: 16 x 16</p>
                    </div>
                </div>
            </div>
            <div id="grid-container"></div>
        </div>
    </main>
    <footer>
        <p>Copyright © billyenglish <i class="fa-brands fa-github" aria-hidden="true"></i></p>
    </footer>
    <script src="/js/script.js"></script>
</body>
</html>
